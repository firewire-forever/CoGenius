# Software Installation Knowledge Base for VSDL Compiler
# 软件安装知识库 - 用于自动化生成 Ansible 安装任务
#
# 字段说明:
#   type: apt | script | manual | pip
#   package: apt 包名 (type=apt 时)
#   verify_cmd: 验证安装是否成功的命令
#   install_script: 自定义安装脚本 (type=script 时)
#   dependencies: 依赖软件列表
#   offline_available: 是否可在离线环境安装

software:
  # ==========================================================================
  # Web 服务器
  # ==========================================================================
  nginx:
    type: apt
    package: nginx
    verify_cmd: "nginx -v"
    offline_available: true

  apache2:
    type: apt
    package: apache2
    verify_cmd: "apache2 -v"
    offline_available: true

  apache:
    type: apt
    package: apache2
    verify_cmd: "apache2 -v"
    offline_available: true

  httpd:
    type: apt
    package: apache2
    verify_cmd: "apache2 -v"
    offline_available: true

  tomcat:
    type: apt
