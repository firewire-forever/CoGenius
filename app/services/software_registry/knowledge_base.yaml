  # ==========================================================================
  # 容器/虚拟化
  # ==========================================================================
  docker:
    type: script
    install_script: |
      apt-get update
      apt-get install -y ca-certificates curl gnupg
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
    verify_cmd: "docker --version"
    offline_available: false

  docker.io:
    type: apt
    package: docker.io
    verify_cmd: "docker --version"
    offline_available: true

  docker-compose:
    type: pip
    package: docker-compose
    verify_cmd: "docker-compose --version"
    offline_available: false

  # ==========================================================================
  # 常见漏洞软件
  # ==========================================================================
  bonitasoft:
    type: manual
    install_script: |
      apt-get install -y openjdk-11-jdk tomcat9
      # 注意: 需要手动下载 bonita.war 并部署到 tomcat
      # 无法自动安装，需要从官网下载或内网镜像
    verify_cmd: "curl -s localhost:8080/bonita"
    dependencies:
      - openjdk-11-jdk
      - tomcat9
    offline_available: false
    note: "需要从官网下载 war 包手动部署"

  jenkins:
    type: script
    install_script: |
      apt-get install -y curl gnupg
      curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | tee /usr/share/keyrings/jenkins-keyring.asc
      echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" | tee /etc/apt/sources.list.d/jenkins.list
      apt-get update
      apt-get install -y jenkins
    verify_cmd: "systemctl status jenkins"
    dependencies:
      - openjdk-11-jdk
    offline_available: false

  wordpress:
    type: script
    install_script: |
      apt-get install -y apache2 php php-mysql mysql-server
      cd /tmp
      wget https://wordpress.org/latest.tar.gz
      tar -xzf latest.tar.gz
      mv wordpress /var/www/html/
      chown -R www-data:www-data /var/www/html/wordpress
      chmod -R 755 /var/www/html/wordpress
    verify_cmd: "ls /var/www/html/wordpress"
    dependencies:
      - apache2
      - php
      - php-mysql
      - mysql-server
    offline_available: false

  drupal:
    type: script
    install_script: |
      apt-get install -y apache2 php php-mysql php-gd php-xml php-mbstring
      cd /tmp
      wget https://ftp.drupal.org/files/projects/drupal-9.tar.gz
      tar -xzf drupal-9.tar.gz
      mv drupal-9 /var/www/html/drupal
      chown -R www-data:www-data /var/www/html/drupal
    verify_cmd: "ls /var/www/html/drupal"
    dependencies:
      - apache2
      - php
      - php-mysql
    offline_available: false

  joomla:
    type: script
    install_script: |
      apt-get install -y apache2 php php-mysql php-xml php-zip
      cd /tmp
      wget https://downloads.joomla.org/cms/joomla4/4-3-0/Joomla_4-3-0-Stable-Full_Package.tar.gz
      mkdir -p /var/www/html/joomla
      tar -xzf Joomla_4-3-0-Stable-Full_Package.tar.gz -C /var/www/html/joomla
      chown -R www-data:www-data /var/www/html/joomla
    verify_cmd: "ls /var/www/html/joomla"
    dependencies:
      - apache2
      - php
      - php-mysql
    offline_available: false

  weblogic:
    type: manual
    install_script: |
      # WebLogic 需要Oracle账号下载，无法自动安装
      # 需要预先下载安装包并放置在指定位置
    verify_cmd: "ls /opt/oracle"
    dependencies:
      - openjdk-8-jdk
    offline_available: false
    note: "需要Oracle账号下载安装包，需手动部署"

  jboss:
    type: script
    install_script: |
      apt-get install -y openjdk-11-jdk
      cd /opt
      wget https://github.com/wildfly/wildfly/releases/download/26.1.3.Final/wildfly-26.1.3.Final.tar.gz
      tar -xzf wildfly-26.1.3.Final.tar.gz
      ln -s /opt/wildfly-26.1.3.Final /opt/wildfly
    verify_cmd: "ls /opt/wildfly"
    dependencies:
      - openjdk-11-jdk
    offline_available: false

  wildfly:
    type: script
    install_script: |
      apt-get install -y openjdk-11-jdk
      cd /opt
      wget https://github.com/wildfly/wildfly/releases/download/26.1.3.Final/wildfly-26.1.3.Final.tar.gz
      tar -xzf wildfly-26.1.3.Final.tar.gz
      ln -s /opt/wildfly-26.1.3.Final /opt/wildfly
    verify_cmd: "ls /opt/wildfly"
    dependencies:
      - openjdk-11-jdk
    offline_available: false

  struts2:
    type: manual
    install_script: |
      # Struts2 是一个框架，需要部署到 Tomcat
      # 需要下载示例应用或手动创建
    verify_cmd: "ls /var/lib/tomcat9/webapps"
    dependencies:
      - tomcat9
      - openjdk-11-jdk
    offline_available: false
    note: "Struts2是框架，需要部署war包到tomcat"

  webmin:
    type: script
    install_script: |
      curl -o setup-repos.sh https://raw.githubusercontent.com/webmin/webmin/master/setup-repos.sh
      sh setup-repos.sh
      apt-get install -y webmin
    verify_cmd: "systemctl status webmin"
    offline_available: false

